name: Deploy App to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          # Go to home
          cd ~

          # Remove old app
          rm -rf app


          # Clone latest code
          git clone https://github.com/mathang292004-dev/simple-poc.git app
          cd app

          # Install dependencies
          npm install

          # Stop old app
          pkill node || true

          # Start app in background
          nohup node app.js > output.log 2>&1 &

          EOF